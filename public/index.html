<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arts &amp; Culture</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e8e8e8; }
      #app { min-height: 100vh; }

      /* Header */
      .header { position: sticky; top: 0; z-index: 10; background: #111; padding: 14px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #222; }
      .header h1 { font-size: 1.1rem; font-weight: 700; color: #e8e8e8; white-space: nowrap; flex-shrink: 0; }

      /* Search bar */
      .search-bar { display: flex; gap: 8px; flex: 1; max-width: 480px; }
      .search-bar input { flex: 1; padding: 9px 14px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; color: #e8e8e8; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.15s; }
      .search-bar input:focus { border-color: #7c7cff; }
      .search-bar input::placeholder { color: #555; }
      .search-bar button { padding: 9px 18px; background: #7c7cff; color: #fff; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
      .search-bar button:hover { background: #6a6ae0; }

      /* Grid */
      .grid-container { padding: 20px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
      .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 1px solid #2a2a2a; }
      .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
      .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #2a2a2a; }
      .card-info { padding: 12px; }
      .card-title { font-size: 0.82rem; font-weight: 600; color: #e8e8e8; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .card-artist { font-size: 0.75rem; color: #888; }

      /* Load more */
      .load-more-wrap { text-align: center; padding: 24px; }
      .load-more { padding: 10px 28px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; color: #e8e8e8; font-size: 0.9rem; cursor: pointer; transition: background 0.15s; }
      .load-more:hover { background: #2a2a2a; }

      /* Empty state */
      .empty-state { text-align: center; padding: 60px 20px; color: #555; }

      /* Loading */
      .loading-card { text-align: center; padding: 60px 24px; }
      .loading-text { color: #666; font-size: 0.95rem; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .loading-text { animation: pulse 1.5s ease-in-out infinite; }

      /* Error */
      .error-card { padding: 20px 24px; background: #1e1010; border-radius: 12px; border: 1px solid #7f1d1d; margin: 20px; }
      .error-message { font-size: 0.9rem; color: #f87171; }

      /* Status bar */
      .status-bar { padding: 6px 16px; background: #1a1a1a; border-top: 1px solid #222; font-size: 0.72rem; color: #555; }
      .status-bar .event { color: #7c7cff; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="status-bar" id="status">Bridge: waiting for host...</div>

    <script>
      // -- State -------------------------------------------------------
      let state = {
        query: '',
        artworks: [],
        detail: null,
        page: 1,
        totalPages: 0,
        loading: false,
        error: null,
      };

      // -- Bridge variables --------------------------------------------
      let hostOrigin = null;
      let appSessionId = null;
      let messageNonce = null;
      var isStandalone = (window.parent === window);
      var protocolVersion = "1";

      // -- Bridge helpers ----------------------------------------------
      function send(event) {
        if (window.parent !== window && hostOrigin && appSessionId && messageNonce) {
          window.parent.postMessage({
            protocolVersion: protocolVersion,
            appSessionId: appSessionId,
            nonce: messageNonce,
            event: event
          }, hostOrigin);
        }
        log("\u2191 " + event.type);
      }

      function log(msg) {
        var el = document.getElementById("status");
        el.innerHTML = 'Bridge: <span class="event">' + escHtml(msg) + '</span>';
      }

      function escHtml(str) {
        var d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function notifyResize() {
        var height = document.documentElement.scrollHeight;
        send({ type: "app:resize", payload: { height: height } });
      }

      function saveState() {
        send({ type: "app:save-state", payload: { state: {
          query: state.query,
          artworks: state.artworks,
          detail: state.detail,
          page: state.page,
          totalPages: state.totalPages,
        } } });
      }

      // -- Bridge listener ---------------------------------------------
      window.addEventListener("message", function (e) {
        var envelope = e.data;
        if (!envelope || envelope.protocolVersion !== protocolVersion || !envelope.event || !envelope.nonce) return;

        var msg = envelope.event;
        if (!msg || !msg.type) return;

        log("\u2193 " + msg.type);

        switch (msg.type) {
          case "host:init":
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            send({ type: "app:ready", payload: { appId: "arts-culture", version: "0.1.0" } });
            loadFeatured();
            break;

          case "host:resume-session":
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            if (msg.payload && msg.payload.state) {
              var s = msg.payload.state;
              state.query = s.query || '';
              state.artworks = s.artworks || [];
              state.detail = s.detail || null;
              state.page = s.page || 1;
              state.totalPages = s.totalPages || 0;
              state.loading = false;
              state.error = null;
            }
            send({ type: "app:ready", payload: { appId: "arts-culture", version: "0.1.0" } });
            render();
            notifyResize();
            break;

          case "host:request-complete":
            sendComplete();
            break;

          default:
            break;
        }
      });

      function sendComplete() {
        var summary;
        if (state.detail) {
          summary = "Viewing " + state.detail.title + (state.detail.artist_title ? " by " + state.detail.artist_title : "");
        } else if (state.query) {
          summary = "Browsing " + state.artworks.length + " results for '" + state.query + "'";
        } else {
          summary = "Browsing featured artworks";
        }
        send({ type: "app:complete", payload: { summary: summary } });
      }

      // -- API ---------------------------------------------------------
      function thumbUrl(imageId) {
        return "https://www.artic.edu/iiif/2/" + imageId + "/full/400,/0/default.jpg";
      }

      function detailUrl(imageId) {
        return "https://www.artic.edu/iiif/2/" + imageId + "/full/843,/0/default.jpg";
      }

      async function searchArtworks(query, page) {
        state.loading = true;
        state.error = null;
        state.query = query;
        render();
        try {
          var url = "https://api.artic.edu/api/v1/artworks/search?q=" + encodeURIComponent(query) +
            "&page=" + page + "&limit=20" +
            "&fields=id,title,artist_title,date_display,image_id" +
            "&query[term][is_public_domain]=true";
          var res = await fetch(url);
          if (!res.ok) throw new Error("Search request failed");
          var data = await res.json();
          var filtered = (data.data || []).filter(function (a) { return a.image_id; });
          if (page === 1) {
            state.artworks = filtered;
          } else {
            state.artworks = state.artworks.concat(filtered);
          }
          state.page = page;
          state.totalPages = (data.pagination && data.pagination.total_pages) ? data.pagination.total_pages : 1;
          state.loading = false;
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to fetch artworks.";
        }
        render();
        notifyResize();
        saveState();
      }

      async function fetchDetail(id) {
        state.loading = true;
        state.error = null;
        render();
        try {
          var url = "https://api.artic.edu/api/v1/artworks/" + id +
            "?fields=id,title,artist_title,date_display,medium_display,dimensions,department_title,description,image_id";
          var res = await fetch(url);
          if (!res.ok) throw new Error("Detail request failed");
          var data = await res.json();
          state.detail = data.data;
          state.loading = false;
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to fetch artwork detail.";
        }
        render();
        notifyResize();
        saveState();
      }

      async function loadFeatured() {
        state.loading = true;
        state.error = null;
        state.query = '';
        render();
        try {
          var url = "https://api.artic.edu/api/v1/artworks/search?q=&limit=20" +
            "&fields=id,title,artist_title,date_display,image_id" +
            "&query[term][is_public_domain]=true";
          var res = await fetch(url);
          if (!res.ok) throw new Error("Featured request failed");
          var data = await res.json();
          var filtered = (data.data || []).filter(function (a) { return a.image_id; });
          state.artworks = filtered;
          state.page = 1;
          state.totalPages = (data.pagination && data.pagination.total_pages) ? data.pagination.total_pages : 1;
          state.loading = false;
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to load featured artworks.";
        }
        render();
        notifyResize();
        saveState();
      }

      // -- Render ------------------------------------------------------
      function render() {
        var root = document.getElementById("app");

        if (state.loading) {
          root.innerHTML =
            '<div class="header"><h1>Arts &amp; Culture</h1></div>' +
            '<div class="loading-card"><div class="loading-text">Loading artworks\u2026</div></div>';
          return;
        }

        if (state.error) {
          root.innerHTML =
            '<div class="header"><h1>Arts &amp; Culture</h1>' + searchBarHtml() + '</div>' +
            '<div class="error-card"><div class="error-message">\u26a0\ufe0f ' + escHtml(state.error) + '</div></div>';
          bindSearch();
          return;
        }

        // Grid view
        var cardsHtml = '';
        if (state.artworks.length === 0) {
          cardsHtml = '<div class="empty-state">No artworks found.</div>';
        } else {
          cardsHtml = '<div class="grid">' +
            state.artworks.map(function (a) {
              return (
                '<div class="card" data-id="' + escHtml(String(a.id)) + '">' +
                  '<img src="' + escHtml(thumbUrl(a.image_id)) + '" alt="' + escHtml(a.title || '') + '" loading="lazy" />' +
                  '<div class="card-info">' +
                    '<div class="card-title">' + escHtml(a.title || 'Untitled') + '</div>' +
                    '<div class="card-artist">' + escHtml(a.artist_title || '') + '</div>' +
                  '</div>' +
                '</div>'
              );
            }).join('') +
          '</div>';
        }

        var loadMoreHtml = (state.page < state.totalPages)
          ? '<div class="load-more-wrap"><button class="load-more" id="load-more-btn">Load more</button></div>'
          : '';

        root.innerHTML =
          '<div class="header"><h1>Arts &amp; Culture</h1>' + searchBarHtml() + '</div>' +
          '<div class="grid-container">' + cardsHtml + loadMoreHtml + '</div>';

        // Bind card clicks
        root.querySelectorAll('.card').forEach(function (card) {
          card.addEventListener('click', function () {
            fetchDetail(card.dataset.id);
          });
        });

        // Bind load more
        var loadMoreBtn = document.getElementById('load-more-btn');
        if (loadMoreBtn) {
          loadMoreBtn.addEventListener('click', function () {
            searchArtworks(state.query, state.page + 1);
          });
        }

        bindSearch();
      }

      function searchBarHtml() {
        return '<div class="search-bar">' +
          '<input type="text" id="search-input" placeholder="Search artworks, e.g. Monet" value="' + escHtml(state.query) + '" />' +
          '<button id="search-btn">Search</button>' +
        '</div>';
      }

      function bindSearch() {
        var input = document.getElementById('search-input');
        var btn = document.getElementById('search-btn');
        if (!input || !btn) return;
        btn.addEventListener('click', function () {
          var val = input.value.trim();
          if (val) searchArtworks(val, 1);
          else loadFeatured();
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            var val = input.value.trim();
            if (val) searchArtworks(val, 1);
            else loadFeatured();
          }
        });
      }

      // -- Initial render ----------------------------------------------
      render();
      if (isStandalone) { loadFeatured(); }
</script>
  </body>
</html>
