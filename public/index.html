<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arts &amp; Culture</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e8e8e8; }
      #app { min-height: 100vh; }

      /* Status bar */
      .status-bar { padding: 6px 16px; background: #1a1a1a; border-top: 1px solid #222; font-size: 0.72rem; color: #555; }
      .status-bar .event { color: #7c7cff; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="status-bar" id="status">Bridge: waiting for host...</div>

    <script>
      // -- State -------------------------------------------------------
      let state = {
        query: '',
        artworks: [],
        detail: null,
        page: 1,
        totalPages: 0,
        loading: false,
        error: null,
      };

      // -- Bridge variables --------------------------------------------
      let hostOrigin = null;
      let appSessionId = null;
      let messageNonce = null;
      var isStandalone = (window.parent === window);
      var protocolVersion = "1";

      // -- Bridge helpers ----------------------------------------------
      function send(event) {
        if (window.parent !== window && hostOrigin && appSessionId && messageNonce) {
          window.parent.postMessage({
            protocolVersion: protocolVersion,
            appSessionId: appSessionId,
            nonce: messageNonce,
            event: event
          }, hostOrigin);
        }
        log("\u2191 " + event.type);
      }

      function log(msg) {
        var el = document.getElementById("status");
        el.innerHTML = 'Bridge: <span class="event">' + escHtml(msg) + '</span>';
      }

      function escHtml(str) {
        var d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function notifyResize() {
        var height = document.documentElement.scrollHeight;
        send({ type: "app:resize", payload: { height: height } });
      }

      function saveState() {
        send({ type: "app:save-state", payload: { state: {
          query: state.query,
          artworks: state.artworks,
          detail: state.detail,
          page: state.page,
          totalPages: state.totalPages,
        } } });
      }

      // -- Bridge listener ---------------------------------------------
      window.addEventListener("message", function (e) {
        var envelope = e.data;
        if (!envelope || envelope.protocolVersion !== protocolVersion || !envelope.event || !envelope.nonce) return;

        var msg = envelope.event;
        if (!msg || !msg.type) return;

        log("\u2193 " + msg.type);

        switch (msg.type) {
          case "host:init":
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            send({ type: "app:ready", payload: { appId: "arts-culture", version: "0.1.0" } });
            loadFeatured();
            break;

          case "host:resume-session":
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            if (msg.payload && msg.payload.state) {
              var s = msg.payload.state;
              state.query = s.query || '';
              state.artworks = s.artworks || [];
              state.detail = s.detail || null;
              state.page = s.page || 1;
              state.totalPages = s.totalPages || 0;
              state.loading = false;
              state.error = null;
            }
            send({ type: "app:ready", payload: { appId: "arts-culture", version: "0.1.0" } });
            render();
            notifyResize();
            break;

          case "host:request-complete":
            sendComplete();
            break;

          default:
            break;
        }
      });

      function sendComplete() {
        var summary;
        if (state.detail) {
          summary = "Viewing " + state.detail.title + (state.detail.artist_title ? " by " + state.detail.artist_title : "");
        } else if (state.query) {
          summary = "Browsing " + state.artworks.length + " results for '" + state.query + "'";
        } else {
          summary = "Browsing featured artworks";
        }
        send({ type: "app:complete", payload: { summary: summary } });
      }

      // -- API ---------------------------------------------------------
      function thumbUrl(imageId) {
        return "https://www.artic.edu/iiif/2/" + imageId + "/full/400,/0/default.jpg";
      }

      function detailUrl(imageId) {
        return "https://www.artic.edu/iiif/2/" + imageId + "/full/843,/0/default.jpg";
      }

      async function searchArtworks(query, page) {
        state.loading = true;
        state.error = null;
        state.query = query;
        render();
        try {
          var url = "https://api.artic.edu/api/v1/artworks/search?q=" + encodeURIComponent(query) +
            "&page=" + page + "&limit=20" +
            "&fields=id,title,artist_title,date_display,image_id" +
            "&query[term][is_public_domain]=true";
          var res = await fetch(url);
          if (!res.ok) throw new Error("Search request failed");
          var data = await res.json();
          var filtered = (data.data || []).filter(function (a) { return a.image_id; });
          if (page === 1) {
            state.artworks = filtered;
          } else {
            state.artworks = state.artworks.concat(filtered);
          }
          state.page = page;
          state.totalPages = (data.pagination && data.pagination.total_pages) ? data.pagination.total_pages : 1;
          state.loading = false;
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to fetch artworks.";
        }
        render();
        notifyResize();
        saveState();
      }

      async function fetchDetail(id) {
        state.loading = true;
        state.error = null;
        render();
        try {
          var url = "https://api.artic.edu/api/v1/artworks/" + id +
            "?fields=id,title,artist_title,date_display,medium_display,dimensions,department_title,description,image_id";
          var res = await fetch(url);
          if (!res.ok) throw new Error("Detail request failed");
          var data = await res.json();
          state.detail = data.data;
          state.loading = false;
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to fetch artwork detail.";
        }
        render();
        notifyResize();
        saveState();
      }

      async function loadFeatured() {
        state.loading = true;
        state.error = null;
        state.query = '';
        render();
        try {
          var url = "https://api.artic.edu/api/v1/artworks/search?q=&limit=20" +
            "&fields=id,title,artist_title,date_display,image_id" +
            "&query[term][is_public_domain]=true";
          var res = await fetch(url);
          if (!res.ok) throw new Error("Featured request failed");
          var data = await res.json();
          var filtered = (data.data || []).filter(function (a) { return a.image_id; });
          state.artworks = filtered;
          state.page = 1;
          state.totalPages = (data.pagination && data.pagination.total_pages) ? data.pagination.total_pages : 1;
          state.loading = false;
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to load featured artworks.";
        }
        render();
        notifyResize();
        saveState();
      }

      // -- Render ------------------------------------------------------
      function render() {
        var root = document.getElementById("app");
        root.innerHTML = '<h1 style="padding:24px;color:#e8e8e8;">Arts &amp; Culture</h1>';
      }

      // -- Initial render ----------------------------------------------
      render();
      if (isStandalone) { loadFeatured(); }
</script>
  </body>
</html>
